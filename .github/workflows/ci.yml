name: CI

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --check

      - name: clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: clippy (png feature)
        run: cargo clippy --all-targets --features png -- -D warnings

      - name: test
        run: cargo test --features png

      - name: bench (compile + smoke)
        run: cargo bench --bench render -- --test

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # paste (via ratatui) and lru (via ratatui's layout cache); not our code
          ignore: |
            RUSTSEC-2024-0436
            RUSTSEC-2026-0002
