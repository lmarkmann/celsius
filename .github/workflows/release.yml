name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  homebrew:
    name: bump homebrew formula
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: celsius
          formula-path: Formula/celsius.rb
          homebrew-tap: lmarkmann/homebrew-tap
          base-branch: main
          download-url: https://github.com/lmarkmann/celsius/archive/refs/tags/${{ github.ref_name }}.tar.gz
          commit-message: |
            celsius ${{ github.ref_name }}

            Created by https://github.com/mislav/bump-homebrew-formula-action
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
